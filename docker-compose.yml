services:
  postgres:
    image: postgres:16-alpine
    container_name: esencia_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-esencia_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    container_name: esencia_backend
    env_file: .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build: ./frontend
    container_name: esencia_frontend
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules # Evita que los módulos locales sobrescriban los del contenedor
    ports:
      - "5173:5173"
    depends_on:
      - backend
